<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>

    <title>Weather Application</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form class="search-form" id="search-form">
          <input
            type="search"
            placeholder="Enter a city"
            required
            class="entry-input"
            id="search-form-input"
          />
          <input type="submit" value="Search" class="submit-button" />
        </form>
      </header>
      <main>
        <div class="weather-app-data">
          <div>
            <h1 class="weather-app-city" id="identified-city"></h1>
            <p class="weather-details">
              <span id="date-and-time"></span>, <span id="condition"></span>
              <br />
              Humidity: <strong id="humidity"></strong>, Wind:
              <strong id="wind"></strong>
            </p>
          </div>
          <div class="specified-temperature">
            <div id="icon"></div>
            <div class="actual-temperature" id="temperature">30</div>
            <div class="temperature-unit">°C</div>
          </div>
        </div>
      </main>
      <footer>
        This project was created by
        <a href="https://github.com/repos" target="_blank">Elisha Geoffrion</a>, is open-sourced on
        <a href="https://github.com/Elisha-RG/Week-7-Weather-Application" target="_blank">GitHub</a> and hosted on
        <a href="#" target="_blank">Netlify</a>
      </footer>
    </div>
    <script src="index.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Weather Application</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form class="search-form">
          <input
            type="search"
            placeholder="Enter a city"
            required
            class="entry-input"
          />
          <input type="submit" value="Search" class="submit-button" />
        </form>
      </header>
      <main>
        <div class="weather-app-data">
          <div>
            <h1 class="weather-app-city">Munich</h1>
            <p class="details">
              Monday, 12:10 cloudy
              <br />
              Humidity: <strong>44%</strong>, Wind: <strong>4 mph</strong>
            </p>
          </div>
          <div class="specified-temp">🌥️ 30°C</div>
        </div>
      </main>
      <footer>
        This project was created by
        <a href="#" target="_blank">Elisha Geoffrion</a>, is open-sourced on
        <a href="#" target="_blank">GitHub</a> and hosted on
        <a href="#" target="_blank">Netlify</a>
      </footer>
    </div>
  </body>
</html>
